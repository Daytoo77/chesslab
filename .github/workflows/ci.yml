# Quality gate: every push/PR must build and pass the unit tests.
name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # `npm install` (not ci): the lockfile predates manually-vendored deps
      - run: npm install --ignore-scripts
      - run: npm test
      - run: npm run build
